name: ⚡ Ultra Fast Flutter CI/CD (Public APK Only)

on:
  push:
    branches:
      - main  # Only runs when merged/pushed into main branch

permissions:
  contents: write  # Needed for GitHub releases upload

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          cache: true

      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🧹 Flutter clean
        run: flutter clean

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🚀 Enable Gradle Performance Boost
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=true" >> ~/.gradle/gradle.properties

      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      - name: 🧾 Rename APK with repo name & timestamp
        run: |
          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          DATE=$(TZ='Asia/Dhaka' date +"%d %b - %I:%M%p")
          NEW_APK_NAME="${REPO_NAME} - ${DATE}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/${NEW_APK_NAME}"
          echo "APK_NAME=${NEW_APK_NAME}" >> $GITHUB_ENV
          echo "✅ Renamed to: ${NEW_APK_NAME}"

      - name: ☁️ Upload APK to Public Repository (No Source)
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          APK_FILE="build/app/outputs/flutter-apk/${APK_NAME}"
          PUBLIC_REPO="iamabdullahhossain/apk-publish"
          TAG_NAME="Task-Management" 
          RELEASE_NAME="Latest Public APK"

          echo "🚀 Uploading $APK_FILE to https://github.com/$PUBLIC_REPO/releases"

          gh release create "$TAG_NAME" \
            --repo="$PUBLIC_REPO" \
            --title="$RELEASE_NAME" \
            --notes="Auto-uploaded from private CI/CD on $(TZ='Asia/Dhaka' date)" \
            --latest --verify-tag=false || true

          gh release upload "$TAG_NAME" "$APK_FILE" --repo="$PUBLIC_REPO" --clobber

      - name: ✅ Confirm Upload
        run: echo "🎉 APK successfully uploaded to https://github.com/iamabdullahhossain/apk-publish/releases/latest"
